<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor climático de Tucumán</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#0b0f19;
    --panel:#121826;
    --panel-border:#232b3d;
    --text:#e6e9ef;
    --text-dim:#8b95a7;
    --accent:#22c55e;
    --red:#f0555a;
    --blue:#4ea1f7;
    --font: 'Consolas','Menlo','Monaco',monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font);}
  body{display:flex;align-items:stretch;min-height:100vh;}

  /* ---------- SIDEBAR ---------- */
  #sidebar{
    width:250px;
    flex:0 0 250px;
    background:var(--panel);
    border-right:1px solid var(--panel-border);
    padding:20px 16px 40px;
    position:sticky;
    top:0;
    height:100vh;
    overflow-y:auto;
  }
  #sidebar h2{
    font-size:0.95rem;
    display:flex;
    align-items:center;
    gap:8px;
    margin:0 0 26px;
    color:var(--text);
  }
  .side-label{
    font-size:0.8rem;
    color:var(--text-dim);
    text-transform:uppercase;
    letter-spacing:0.04em;
    margin:0 0 8px;
    text-align:center;
  }
  .side-block{margin-bottom:22px;}
  select#barrioSelect{
    width:100%;
    background:#0d1220;
    color:var(--text);
    border:1px solid var(--panel-border);
    border-radius:6px;
    padding:8px 10px;
    font-family:var(--font);
    font-size:0.85rem;
  }
  .mode-toggle{
    display:flex;
    gap:8px;
  }
  .mode-btn{
    flex:1;
    background:transparent;
    border:1px solid var(--panel-border);
    color:var(--text);
    padding:8px 4px;
    border-radius:8px;
    font-family:var(--font);
    font-size:0.82rem;
    cursor:pointer;
  }
  .mode-btn.active{border-color:var(--red);color:var(--red);}
  .date-block{margin-top:14px;}
  .date-block > label{
    display:block;
    font-size:0.72rem;
    color:var(--text-dim);
    margin-bottom:4px;
  }
  .mini-cal{
    background:#0d1220;
    border:1px solid var(--panel-border);
    border-radius:8px;
    padding:8px;
    margin-bottom:12px;
  }
  .mini-cal .cal-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:6px;
  }
  .mini-cal .cal-nav{
    background:none;
    border:none;
    color:var(--text-dim);
    cursor:pointer;
    font-size:0.9rem;
    padding:2px 8px;
    border-radius:4px;
  }
  .mini-cal .cal-nav:hover{background:#1a2234;color:var(--text);}
  .mini-cal .cal-title{font-size:0.78rem;color:var(--text);font-weight:600;}
  .mini-cal .cal-grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:2px;
  }
  .mini-cal .cal-dow{
    font-size:0.62rem;
    color:var(--text-dim);
    text-align:center;
    padding:3px 0;
  }
  .mini-cal .cal-day{
    font-size:0.72rem;
    text-align:center;
    padding:5px 0;
    border-radius:5px;
    cursor:pointer;
    color:var(--text);
  }
  .mini-cal .cal-day:hover{background:#1a2234;}
  .mini-cal .cal-day.muted{color:#3d465c;}
  .mini-cal .cal-day.selected{background:var(--accent);color:#04240f;font-weight:700;}
  .mini-cal .cal-day.today{outline:1px solid var(--blue);}
  #applyRange{
    width:100%;
    background:var(--accent);
    color:#04240f;
    border:none;
    border-radius:6px;
    padding:8px;
    font-family:var(--font);
    font-weight:600;
    font-size:0.8rem;
    cursor:pointer;
  }
  hr.side-sep{border:none;border-top:1px solid var(--panel-border);margin:20px 0;}
  #varsList label{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:0.8rem;
    padding:4px 2px;
    cursor:pointer;
    color:var(--text);
  }
  #varsList input{accent-color:var(--accent);}
  #barrioStatus, #varsHint{font-size:0.7rem;color:var(--text-dim);}

  /* ---------- MAIN ---------- */
  #main{flex:1 1 auto;min-width:0;padding:24px 28px 60px;}
  header{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin-bottom:4px;}
  header h1{font-size:1.4rem;margin:0;display:flex;align-items:center;gap:8px;}
  header h1 .dot{color:var(--accent);}
  .loc{color:var(--text-dim);font-size:0.95rem;display:flex;align-items:center;gap:6px;}
  .subtitle{color:var(--text-dim);font-size:0.85rem;margin:2px 0 22px;}
  #status{font-size:0.78rem;color:var(--text-dim);margin-bottom:18px;}
  #status.err{color:var(--red);}
  .grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(160px,1fr));gap:12px;margin-bottom:26px;}
  .card{background:var(--panel);border:1px solid var(--panel-border);border-radius:10px;padding:14px 16px;}
  .card .label{font-size:0.72rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.03em;display:flex;align-items:center;gap:6px;margin-bottom:10px;}
  .card .value{font-size:1.5rem;font-weight:600;}
  .card .unit{font-size:0.85rem;font-weight:400;color:var(--text-dim);margin-left:2px;}
  .charts{display:grid;grid-template-columns:repeat(auto-fit, minmax(360px,1fr));gap:20px;}
  .chart-box{background:var(--panel);border:1px solid var(--panel-border);border-radius:10px;padding:14px 16px 6px;}
  .chart-box h3{margin:0 0 8px;font-size:0.85rem;color:var(--text-dim);font-weight:500;}
  canvas{max-height:220px;}

  /* ---------- TOP-LEVEL VIEW TABS ---------- */
  .view-tabs{display:flex;gap:8px;margin-bottom:18px;}
  .view-tab-btn{
    background:transparent;
    border:1px solid var(--panel-border);
    color:var(--text-dim);
    padding:8px 16px;
    border-radius:8px;
    font-family:var(--font);
    font-size:0.85rem;
    cursor:pointer;
  }
  .view-tab-btn.active{border-color:var(--accent);color:var(--accent);}

  /* ---------- STATS VIEW ---------- */
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(420px,1fr));gap:18px;}
  .stat-card{
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:12px;
    padding:18px 20px;
    display:flex;
    gap:18px;
    align-items:center;
    flex-wrap:wrap;
  }
  .stat-card .stat-left{flex:1 1 220px;min-width:200px;}
  .stat-card .stat-title{font-size:1rem;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
  .stat-card .stat-row{font-weight:700;color:#facc15;font-size:0.95rem;margin:3px 0;}
  .stat-card .stat-row .stat-name{color:#facc15;}
  .stat-card .stat-row.trend-up{color:#f0555a;}
  .stat-card .stat-row.trend-down{color:#4ea1f7;}
  .stat-card .stat-row.trend-flat{color:#8b95a7;}
  .stat-card .stat-row.trend-up .stat-name, .stat-card .stat-row.trend-up .trend-val{color:#f0555a;}
  .stat-card .stat-row.trend-down .stat-name, .stat-card .stat-row.trend-down .trend-val{color:#4ea1f7;}
  .stat-card .stat-row.trend-flat .stat-name, .stat-card .stat-row.trend-flat .trend-val{color:#8b95a7;}
  .stat-card .stat-right{flex:1 1 220px;min-width:220px;max-width:320px;}
  .stat-card canvas{max-height:180px;}
  #statsEmpty{color:var(--text-dim);font-size:0.85rem;}

  @media (max-width:840px){
    body{flex-direction:column;}
    #sidebar{width:100%;flex:none;height:auto;position:relative;border-right:none;border-bottom:1px solid var(--panel-border);}
  }
</style>
</head>

/* Normaliza un encabezado para poder compararlo sin importar mayúsculas,
   espacios repetidos o presencia/ausencia de paréntesis. */
function normKey(k){
  return String(k)
    .toLowerCase()
    .replace(/[()]/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

/* Índice de OVERRIDES ya normalizado, armado una sola vez al cargar. */
const OVERRIDES_NORM = {};
Object.keys(OVERRIDES).forEach(k => { OVERRIDES_NORM[normKey(k)] = OVERRIDES[k]; });

/* Busca en OVERRIDES primero por clave exacta y, si no encuentra,
   por clave normalizada. */
function lookupOverride(key){
  return OVERRIDES[key] || OVERRIDES_NORM[normKey(key)] || null;
}

/* Regla de respaldo: cualquier columna de lluvia/precipitación que no esté
   listada arriba con su nombre exacto también se pinta celeste. */

];

const AUTO_ICON_RULES = [
  [/temperat/i, "🌡️"], [/presi[oó]n/i, "⬤"], [/humedad abs/i, "💨"], [/humedad/i, "💧"],
  [/densidad/i, "≋"], [/sensaci[oó]n/i, "🔥"], [/bulbo/i, "●"], [/roc[ií]o/i, "☁️"],
  [/altitud/i, "📐"], [/lux|iluminan/i, "💡"], [/uv/i, "☀️"], [/ruido|ac[uú]stic/i, "🔊"],
  [/toa/i, "☀️"], [/viento/i, "🍃"], [/lluvia|precipita/i, "🌧️"],

function cssId(k){ return k.replace(/[^a-zA-Z0-9]/g,"_"); }

/* ---------------- lectura de Google Sheets (gviz jsonp) ---------------- */
function parseGvizDate(v){
  const m = /Date\((\d+),(\d+),(\d+),(\d+),(\d+),(\d+)/.exec(v);
  if(!m) return null;
  return new Date(+m[1], +m[2], +m[3], +m[4], +m[5], +m[6]);
}

function fetchSheet(sheetId, sheetName){
  return new Promise((resolve, reject) => {
    const cbName = "gvizCb_" + Date.now() + "_" + Math.floor(Math.random()*1e6);
    const timeout = setTimeout(() => {
      cleanup();
      reject(new Error("Timeout leyendo el Sheet (¿está compartido públicamente?)"));
    }, 15000);

    function cleanup(){
      clearTimeout(timeout);
      delete window[cbName];
      if(script.parentNode) script.parentNode.removeChild(script);
    }

    window[cbName] = function(json){
      cleanup();
      try{
        const cols = json.table.cols.map(c => c.label);
        const rows = json.table.rows.map(r => {
          const obj = {};
          r.c.forEach((cell, i) => {
            if(!cell){ obj[cols[i]] = null; return; }
            obj[cols[i]] = (cols[i] === "Fecha/Hora") ? parseGvizDate(cell.v) : cell.v;
          });
          return obj;
        });
        resolve({ cols, rows });
      } catch(e){ reject(e); }
    };

    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json;responseHandler:${cbName}&sheet=${encodeURIComponent(sheetName)}&_=${Date.now()}`;
    const script = document.createElement("script");
    script.src = url;
    script.onerror = () => { cleanup(); reject(new Error("No se pudo cargar el Sheet (verificá que esté compartido como 'Cualquiera con el enlace')")); };
    document.body.appendChild(script);
  });
}

/* ---------------- construcción dinámica del menú de estaciones ---------------- */
async function loadBarrios(){
  // Cada estación es una planilla (spreadsheet) propia, definida en
  // BARRIOS más arriba. El dashboard SOLO lee de las estaciones listadas
  // ahí (actualmente: ISANMI97 e ISANMI169).
  barrios = BARRIOS;

  if(!barrios.length){
    barrioStatusEl.textContent = "⚠ No hay estaciones configuradas en BARRIOS.";
    return;
  }
  barrioStatusEl.textContent = "";

  barrioSelectEl.innerHTML = "";
  barrios.forEach(b => {
    const opt = document.createElement("option");
    opt.value = b.key;
    opt.textContent = b.nombre;
    barrioSelectEl.appendChild(opt);
  });
  barrioSelectEl.value = barrios[0].key;
  selectBarrio(barrios[0].key);
}

/* ---------------- parser de "Detalle Nubosidad" (texto tipo METAR) ----------------
   Formato esperado en la celda, ej:
     "75% a 300 ft | 100% a 1500 ft"
     "25% a 500 ft | 75% a 1200 ft | 100% a 3000 ft"
     "0% — CAVOK (del METAR crudo)"
   Se detecta por patrón de contenido (no por nombre de columna exacto),
   así funciona sin importar cómo se llame el encabezado real de la celda. */
function parseNubosidadDetalle(text){
  if(text === null || text === undefined) return null;
  const str = String(text).trim();
  if(!str) return null;
  if(/cavok/i.test(str)) return { cavok:true, layers:[] };
  const parts = str.split("|").map(s => s.trim()).filter(Boolean);
  const layers = [];
  parts.forEach(p => {
    const m = /(\d+(?:[.,]\d+)?)\s*%\s*a\s*(\d+(?:[.,]\d+)?)\s*ft/i.exec(p);
    if(m){
      const pct = parseFloat(m[1].replace(",", "."));
      const ft  = parseFloat(m[2].replace(",", "."));
      if(!Number.isNaN(pct) && !Number.isNaN(ft)){
        layers.push({ pct, ft, m: ft * FT_TO_M });
      }
    }
  });
  layers.sort((a,b) => a.m - b.m);
  return { cavok:false, layers };
}

function looksLikeNubosidadDetalle(val){
  if(typeof val !== "string") return false;
  return /cavok/i.test(val) || /\d+\s*%\s*a\s*\d+\s*ft/i.test(val);
}

/* ---------------- detección dinámica de columnas / metadatos ---------------- */
function buildFieldMeta(cols, sampleRow){
  const meta = [];
  let colorIdx = 0;
  cols.forEach(key => {
    if(key === "Fecha/Hora") return;
    const ov = lookupOverride(key);
    const val = sampleRow ? sampleRow[key] : null;
    const isWindDir = ov && ov.winddir;

    // Columna sin datos en el último registro (null/undefined/""): se omite
    // por completo, no se muestra como tarjeta vacía "--". EXCEPCIÓN: la
    // columna de dirección de viento sí se muestra igual (la brújula queda
    // sin flecha) porque el widget debe permanecer visible aunque el sensor
    // no haya reportado un dato en la última lectura.
    if(!isWindDir && (val === null || val === undefined || val === "")) return;

    // Columna de dirección de viento: se maneja con su propio widget de
    // brújula (N/E/S/O + flecha), no como tarjeta numérica ni gráfico de
    // línea normal.
    if(isWindDir){
      meta.push({ key, label: ov.label, icon: ov.icon, unit:"°", dec:0, color: ov.color || "#e5e7eb", winddir:true });
      return;
    }

    // Columna de Índice UV: se marca aparte para que su tarjeta muestre el
    // número grande + la categoría de riesgo (Bajo/Moderado/Alto/Muy
    // Alto/Extremo), ambos coloreados según la escala oficial. El gráfico
    // histórico de esta variable sigue siendo el gráfico de línea normal
    // (no se toca), igual que se hizo con la brújula de viento.
    if(ov && ov.uvindex){
      meta.push({ key, label: ov.label, icon: ov.icon, unit:"", dec:0, color: ov.color || "#facc15", uvindex:true });
      return;
    }

    // Columna de "Detalle Nubosidad" (capas tipo METAR, texto libre con
    // patrón "X% a Y ft" o "CAVOK"): se detecta por contenido, no por
    // nombre exacto de encabezado, y se maneja con su propio gráfico.
    if(looksLikeNubosidadDetalle(val)){
      meta.push({ key, label:"Detalle Nubosidad", icon:"☁️", unit:"", dec:0, color:"#a3a3a3", nubosidad:true });
      return;
    }

    const isNumeric = typeof val === "number";

    if(ov && ov.text){
      meta.push({ key, label: ov.label, icon: ov.icon, unit:"", dec:0, color:"#a3a3a3", text:true });
      return;
    }
    if(!isNumeric && typeof val !== "number"){
      // columna categórica/texto (o sin datos aún): mostrar como tarjeta de texto
      const m = /^(.*)\s\(([^)]+)\)$/.exec(key);
      meta.push({ key, label: ov ? ov.label : (m ? m[1] : key), icon: ov ? ov.icon : "🏷️", unit:"", dec:0, color:"#a3a3a3", text:true });
      return;
    }
    let label = key, unit = "";
    const m = /^(.*)\s\(([^)]+)\)$/.exec(key);
    if(m){ label = m[1]; unit = m[2]; }
    if(ov){
      label = ov.label;
      // Si el override trae una unidad explícita (ej. "counts" para los
      // sensores ópticos en crudo TSL2591/LTR390), prevalece sobre la que
      // venga en el encabezado del Sheet (que hoy trae "TSL"/"LTR", el
      // nombre del chip, no una unidad real).
      if(ov.unit !== undefined) unit = ov.unit;
    }
    const icon = ov ? ov.icon : (AUTO_ICON_RULES.find(([re]) => re.test(label))?.[1] || "▪️");
    const ruleColor = AUTO_COLOR_RULES.find(([re]) => re.test(label))?.[1];
    const color = ov ? ov.color : (ruleColor || AUTO_COLOR_PALETTE[colorIdx++ % AUTO_COLOR_PALETTE.length]);
    const dec = Number.isInteger(val) ? 0 : 1;
    meta.push({ key, label, icon, unit, dec, color, text:false });
  });
  return meta;
}

/* ---------------- render de checkboxes de variables ---------------- */
function renderVarsList(meta){
  varsListEl.innerHTML = "";
  if(!meta.length){
    varsListEl.innerHTML = `<span id="varsHint">No se encontraron columnas para esta estación.</span>`;
    return;
  }
  // Primera carga para esta estación: tildar TODAS las variables por defecto.
  if(checkedKeys.size === 0){
    meta.forEach(f => checkedKeys.add(f.key));
  }
  meta.forEach(f => {
    const id = "chk_" + cssId(f.key);
    const wrap = document.createElement("label");
    wrap.innerHTML = `<input type="checkbox" id="${id}" ${checkedKeys.has(f.key) ? "checked" : ""}> ${f.icon} ${f.label}`;
    wrap.querySelector("input").addEventListener("change", (e) => {
      if(e.target.checked) checkedKeys.add(f.key); else checkedKeys.delete(f.key);
      renderCurrentView();
    });
    varsListEl.appendChild(wrap);
  });
}

/* Formatea la marca de tiempo del eje X. En modo "actual" (ventana de 24 hs)
   mostramos solo hora:minuto en formato 24 hs (sin AM/PM), porque no tiene
   sentido repetir la fecha si todos los puntos son del mismo día/ventana
   corta. En modo "histórico" (rango de días elegido por el usuario) sí
   mostramos día y mes además de la hora, porque el rango puede abarcar
   varios días.
*/
function formatAxisLabel(date){
  if(!date) return "";
  if(mode === "historico"){
    return date.toLocaleString("es-AR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit",hour12:false});
  }
  return date.toLocaleString("es-AR",{hour:"2-digit",minute:"2-digit",hour12:false});
}

function makeChart(ctx, color){
  return new Chart(ctx, {
    type: "line",
    data: { labels: [], datasets: [{ data: [], borderColor: color, backgroundColor: color + "33", fill: true, tension: 0.25, pointRadius: 0, borderWidth: 2 }] },
    options: {
      responsive: true, animation: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: "#8b95a7", maxTicksLimit: 8, font:{size:10} }, grid:{color:"#232b3d"} },
        y: { ticks: { color: "#8b95a7", font:{size:10} }, grid:{color:"#232b3d"} }
      }
    }
  });
}

/* ---------------- gráfico especial "Detalle nubosidad" ----------------
   El relleno va ENTRE cada par de capas consecutivas (no desde el suelo):
     - 1 sola capa: no hay nada que rellenar, se traza solo la línea.
     - 2 capas: se rellena la banda entre ambas — un cuadrilátero con
       vértices (0,h1)-(p1,h1)-(p2,h2)-(0,h2), válido sea cual sea la
       dirección del cambio de % entre capas (no se auto-intersecta,
       porque el borde izquierdo siempre cierra en x=0).
     - 3+ capas: se repite lo anterior para cada par consecutivo, dando
       N-1 bandas apiladas.
   El eje Y es dinámico: su máximo se fija para que la altura de la capa
   más alta quede al 75% de la altura total del gráfico.

   NOTA (tamaño de texto): los tamaños de fuente de este SVG (etiquetas de
   ejes y ticks) se subieron respecto a la versión original para que, una
   vez que el SVG se escala dentro de la caja del chart-box, el texto se
   vea del mismo tamaño visual que el de los demás gráficos (que usan
   Chart.js con font-size 10 renderizado a resolución nativa del canvas).
   Como el SVG usa viewBox y se estira/achica según el contenedor, su
   font-size en unidades del viewBox necesita ser mayor para compensar
   esa reducción de escala. */
function formatAlturaTick(v){
  if(v >= 100) return Math.round(v).toLocaleString("es-AR");
  return v.toFixed(1).replace(".", ",");
}

function buildNubosidadSVG(parsed){
  const W = 560, H = 300;
  const mL = 82, mR = 16, mT = 14, mB = 44;
  const plotW = W - mL - mR;
  const plotH = H - mT - mB;

  if(!parsed || parsed.cavok || !parsed.layers.length){
    const msg = (parsed && parsed.cavok) ? "☀️ CAVOK — cielo despejado" : "Sin datos de nubosidad";
    return `<div style="color:#8b95a7;font-size:0.85rem;padding:40px 0;text-align:center;">${msg}</div>`;
  }

  const layers = parsed.layers;
  const maxH = layers[layers.length - 1].m;
  const axisMax = maxH > 0 ? maxH / 0.75 : 1000;

  const sx = pct => mL + (pct / 100) * plotW;
  const sy = h   => mT + plotH - (h / axisMax) * plotH;

  let gridY = "";
  for(let i = 0; i <= 5; i++){
    const hv = axisMax * i / 5;
    const y = sy(hv);
    gridY += `<line x1="${mL}" y1="${y}" x2="${W - mR}" y2="${y}" stroke="#232b3d" stroke-width="1"/>`;
    gridY += `<text x="${mL - 10}" y="${y + 5}" text-anchor="end" font-size="14" fill="#8b95a7" font-family="Consolas,Menlo,Monaco,monospace">${formatAlturaTick(hv)}</text>`;
  }

  let gridX = "";
  for(let p = 0; p <= 100; p += 10){
    const x = sx(p);
    gridX += `<line x1="${x}" y1="${mT}" x2="${x}" y2="${H - mB}" stroke="#232b3d" stroke-width="1"/>`;
    gridX += `<text x="${x}" y="${H - mB + 20}" text-anchor="middle" font-size="14" fill="#8b95a7" font-family="Consolas,Menlo,Monaco,monospace">${p}</text>`;
  }

  let shapes = "";
  if(layers.length === 1){
    const L = layers[0];
    shapes = `<line x1="${sx(0)}" y1="${sy(L.m)}" x2="${sx(L.pct)}" y2="${sy(L.m)}" stroke="#e5e7eb" stroke-width="2"/>`;
  } else {
    for(let i = 0; i < layers.length - 1; i++){
      const a = layers[i], b = layers[i + 1];
      const pts = `${sx(0)},${sy(a.m)} ${sx(a.pct)},${sy(a.m)} ${sx(b.pct)},${sy(b.m)} ${sx(0)},${sy(b.m)}`;
      shapes += `<polygon points="${pts}" fill="#cbd5e1" fill-opacity="0.55" stroke="#e5e7eb" stroke-width="2"/>`;
    }
  }

  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;max-height:260px;">
    ${gridY}${gridX}
    ${shapes}
    <line x1="${mL}" y1="${mT}" x2="${mL}" y2="${H - mB}" stroke="#3d465c" stroke-width="1"/>
    <line x1="${mL}" y1="${H - mB}" x2="${W - mR}" y2="${H - mB}" stroke="#3d465c" stroke-width="1"/>
    <text x="${mL + plotW / 2}" y="${H - 6}" text-anchor="middle" font-size="13" fill="#8b95a7" font-family="Consolas,Menlo,Monaco,monospace">nubosidad (%)</text>
    <text x="16" y="${mT + plotH / 2}" text-anchor="middle" font-size="13" fill="#8b95a7" font-family="Consolas,Menlo,Monaco,monospace" transform="rotate(-90 16 ${mT + plotH / 2})">Altura (m)</text>
  </svg>`;
}

/* ---------------- widget "Dirección del viento" (brújula) ----------------
   Va SOLO dentro del cartel de "valor actual" (la tarjeta chica), no
   reemplaza el gráfico histórico: la serie de tiempo de grados sigue
   graficándose como cualquier otra variable numérica en la sección de
   gráficos.

   CONVENCIÓN DE ÁNGULO: el dato es el estándar meteorológico — grados
   medidos en sentido horario desde el Norte (0°=N, 90°=E, 180°=S, 270°=O).
   Se traduce a coordenadas SVG con N arriba (−y) y E a la derecha (+x):
     x = cx + r*sin(θ)
     y = cy − r*cos(θ)
   así 0° cae justo arriba (N), 90° a la derecha (E), 180° abajo (S) y
   270° a la izquierda (O), respetando el sentido horario real.

   Si no hay dato (null/undefined/"" o no numérico) NO se dibuja flecha:
   solo queda la rosa de los vientos vacía con la leyenda "s/d" en el
   centro, tal como pidió el usuario ("si no se reporta la dirección
   desaparece la flecha"). */
function buildWindDirSVG(deg){
  const W = 180, H = 180;
  const cx = 90, cy = 90, r = 58;
  const hasData = typeof deg === "number" && !Number.isNaN(deg);

  let arrow = "";
  if(hasData){
    const theta = (deg * Math.PI) / 180;
    const tipX  = cx + r * 0.68 * Math.sin(theta);
    const tipY  = cy - r * 0.68 * Math.cos(theta);
    const tailX = cx - r * 0.08 * Math.sin(theta);
    const tailY = cy + r * 0.08 * Math.cos(theta);

    // Cabeza de flecha: dos trazos cortos que "abren" hacia atrás desde la
    // punta, como en el ejemplo de referencia (no es un triángulo relleno).
    const headLen = 11;
    const headAngle = 0.5; // ~29°
    const back1 = theta + Math.PI - headAngle;
    const back2 = theta + Math.PI + headAngle;
    const h1x = tipX + headLen * Math.sin(back1);
    const h1y = tipY - headLen * Math.cos(back1);
    const h2x = tipX + headLen * Math.sin(back2);
    const h2y = tipY - headLen * Math.cos(back2);

    arrow = `
      <line x1="${tailX.toFixed(1)}" y1="${tailY.toFixed(1)}" x2="${tipX.toFixed(1)}" y2="${tipY.toFixed(1)}" stroke="#e5e7eb" stroke-width="3" stroke-linecap="round"/>
      <line x1="${tipX.toFixed(1)}" y1="${tipY.toFixed(1)}" x2="${h1x.toFixed(1)}" y2="${h1y.toFixed(1)}" stroke="#e5e7eb" stroke-width="3" stroke-linecap="round"/>
      <line x1="${tipX.toFixed(1)}" y1="${tipY.toFixed(1)}" x2="${h2x.toFixed(1)}" y2="${h2y.toFixed(1)}" stroke="#e5e7eb" stroke-width="3" stroke-linecap="round"/>
    `;
  }

  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:150px;height:auto;display:block;margin:0 auto;">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#e5e7eb" stroke-width="2"/>
    <text x="${cx}" y="${cy - r - 9}" text-anchor="middle" font-size="14" font-weight="700" fill="#e6e9ef" font-family="Consolas,Menlo,Monaco,monospace">N</text>
    <text x="${cx}" y="${cy + r + 18}" text-anchor="middle" font-size="14" font-weight="700" fill="#e6e9ef" font-family="Consolas,Menlo,Monaco,monospace">S</text>
    <text x="${cx + r + 15}" y="${cy + 5}" text-anchor="middle" font-size="14" font-weight="700" fill="#e6e9ef" font-family="Consolas,Menlo,Monaco,monospace">E</text>
    <text x="${cx - r - 15}" y="${cy + 5}" text-anchor="middle" font-size="14" font-weight="700" fill="#e6e9ef" font-family="Consolas,Menlo,Monaco,monospace">O</text>
    ${arrow}
    ${!hasData ? `<text x="${cx}" y="${cy + 4}" text-anchor="middle" font-size="11" fill="#8b95a7" font-family="Consolas,Menlo,Monaco,monospace">s/d</text>` : ""}
  </svg>`;
}

/* ---------------- widget "Índice UV" (número + categoría de riesgo) ----------------
   Escala oficial (OMS): 0-2 Bajo, 3-5 Moderado, 6-7 Alto, 8-10 Muy Alto,
   11+ Extremo. El número y la etiqueta de categoría se colorean igual,
   usando el color de fondo de cada franja de la escala (adaptado a texto
   legible sobre el fondo oscuro del panel). Va SOLO en el cartel de valor
   actual, igual que la brújula: el gráfico histórico de la variable "UV"
   sigue siendo el gráfico de línea normal. */
const UV_SCALE = [
  { max:2,  label:"Bajo",      color:"#9ccc3c" },
  { max:5,  label:"Moderado",  color:"#ffe600" },
  { max:7,  label:"Alto",      color:"#ff9800" },
  { max:10, label:"Muy Alto",  color:"#f0555a" },
  { max:Infinity, label:"Extremo", color:"#b39ddb" },
];
function uvLevelInfo(v){
  if(v === null || v === undefined || Number.isNaN(v)) return { label:null, color:"#8b95a7" };
  const clamped = Math.max(0, v);
  return UV_SCALE.find(s => clamped <= s.max) || UV_SCALE[UV_SCALE.length - 1];
}

function renderCardsAndCharts(meta, windowedRows, latestRow){
  cardsEl.innerHTML = "";
  chartsEl.innerHTML = "";
  charts = {};

  const active = meta.filter(f => checkedKeys.has(f.key));

  active.forEach(f => {
    const div = document.createElement("div");
    div.className = "card";
    const valId = "v_" + cssId(f.key);
    if(f.winddir){
      div.innerHTML = `<div class="label">${f.icon} ${f.label}</div><div class="value" id="${valId}" style="font-size:1rem;">${buildWindDirSVG(null)}</div>`;
    } else if(f.uvindex){
      div.innerHTML = `<div class="label">${f.icon} ${f.label}</div><div class="value" id="${valId}" style="text-align:center;font-size:1rem;">--</div>`;
    } else if(f.nubosidad){
      div.innerHTML = `<div class="label">${f.icon} ${f.label}</div><div class="value" id="${valId}" style="font-size:0.95rem;">--</div>`;
    } else if(f.text){
      div.innerHTML = `<div class="label">${f.icon} ${f.label}</div><div class="value" id="${valId}" style="font-size:1.1rem;">--</div>`;
    } else {
      div.innerHTML = `<div class="label">${f.icon} ${f.label}</div><div class="value" id="${valId}">--<span class="unit">${f.unit}</span></div>`;
    }
    cardsEl.appendChild(div);
  });

  active.filter(f => !f.text && !f.nubosidad).forEach(f => {
    const box = document.createElement("div");
    box.className = "chart-box";
    const canvasId = "chart_" + cssId(f.key);
    box.innerHTML = `<h3>${f.icon} ${f.label} (${f.unit})</h3><canvas id="${canvasId}"></canvas>`;
    chartsEl.appendChild(box);
    charts[f.key] = makeChart(document.getElementById(canvasId), f.color);
  });

  active.filter(f => f.nubosidad).forEach(f => {
    const box = document.createElement("div");
    box.className = "chart-box";
    const val = latestRow ? latestRow[f.key] : null;
    const parsed = parseNubosidadDetalle(val);
    box.innerHTML = `<h3>${f.icon} Detalle nubosidad</h3><div>${buildNubosidadSVG(parsed)}</div>`;
    chartsEl.appendChild(box);
  });

  if(latestRow){
    active.forEach(f => {
      const el = document.getElementById("v_" + cssId(f.key));
      if(!el) return;
      const val = latestRow[f.key];
      if(f.winddir){
        const deg = (typeof val === "number" && !Number.isNaN(val)) ? val : null;
        el.innerHTML = buildWindDirSVG(deg);
      } else if(f.uvindex){
        const v = (typeof val === "number" && !Number.isNaN(val)) ? Math.round(val) : null;
        const info = uvLevelInfo(v);
        el.innerHTML = (v === null)
          ? `<span style="color:#8b95a7;">--</span>`
          : `<div style="font-size:1.9rem;font-weight:800;color:${info.color};line-height:1.1;">${v}</div>` +
            `<div style="font-size:0.85rem;font-weight:700;color:${info.color};margin-top:2px;">${info.label}</div>`;
      } else if(f.nubosidad){
        const parsed = parseNubosidadDetalle(val);
        if(!parsed) el.textContent = "--";
        else if(parsed.cavok) el.textContent = "CAVOK";
        else el.textContent = parsed.layers.length + " capa(s)";
      } else if(f.text){
        el.textContent = (val === null || val === undefined || val === "") ? "--" : val;
      } else if(typeof val === "number"){
        el.innerHTML = val.toFixed(f.dec) + `<span class="unit">${f.unit}</span>`;
      } else {
        el.innerHTML = "--" + `<span class="unit">${f.unit}</span>`;
      }
    });
  }

  active.filter(f => !f.text && !f.nubosidad).forEach(f => {
    const chart = charts[f.key];
    if(!chart) return;
    chart.data.labels = windowedRows.map(r => formatAxisLabel(r["Fecha/Hora"]));
    chart.data.datasets[0].data = windowedRows.map(r => r[f.key]);
    chart.update();
  });
}

/* ---------------- pestaña de ESTADÍSTICAS ---------------- */
function linearRegression(values){
  // values: array de números (o null) en orden temporal. Devuelve array del
  // mismo largo con la recta de tendencia (y = a + b*x) ajustada por mínimos
  // cuadrados sobre los puntos válidos (ignora nulls).
  const pts = [];
  values.forEach((v, i) => { if(typeof v === "number" && !Number.isNaN(v)) pts.push([i, v]); });
  if(pts.length < 2) return values.map(() => null);
  const n = pts.length;
  let sumX=0, sumY=0, sumXY=0, sumXX=0;
  pts.forEach(([x,y]) => { sumX+=x; sumY+=y; sumXY+=x*y; sumXX+=x*x; });
  const denom = (n*sumXX - sumX*sumX);
  if(denom === 0) return values.map(() => null);
  const b = (n*sumXY - sumX*sumY) / denom;
  const a = (sumY - b*sumX) / n;
  return values.map((v,i) => a + b*i);
}

function computeStats(values){
  const nums = values.filter(v => typeof v === "number" && !Number.isNaN(v));
  if(!nums.length) return null;
  const avg = nums.reduce((s,v) => s+v, 0) / nums.length;
  const max = Math.max(...nums);
  const min = Math.min(...nums);
  const variacion = nums[nums.length - 1] - nums[0]; // último - primero (puede ser +, 0 o -)
  return { avg, max, min, variacion };
}

/* Pendiente de la recta de regresión (mínimos cuadrados) en unidades/hora,
   usando el tiempo real (Fecha/Hora) de cada punto como variable X, así el
   resultado queda en unidades físicas por hora (°C/h, hPa/h, %/h, etc.). */
function computeTrendPerHour(windowedRows, key){
  const pts = [];
  windowedRows.forEach(r => {
    const t = r["Fecha/Hora"];
    const v = r[key];
    if(t && typeof v === "number" && !Number.isNaN(v)){
      pts.push([ t.getTime() / 3600000, v ]); // X en horas
    }
  });
  if(pts.length < 2) return null;
  const n = pts.length;
  let sumX=0, sumY=0, sumXY=0, sumXX=0;
  pts.forEach(([x,y]) => { sumX+=x; sumY+=y; sumXY+=x*y; sumXX+=x*x; });
  const denom = (n*sumXX - sumX*sumX);
  if(denom === 0) return 0;
  return (n*sumXY - sumX*sumY) / denom; // pendiente = unidades por hora
}

function formatTendencia(v, unit){
  if(v === null || v === undefined || Number.isNaN(v)) return "s/d";
  const abs = Math.abs(v);
  const dec = abs !== 0 && abs < 0.1 ? 3 : (abs < 1 ? 2 : 1);
  const signo = v > 0 ? "+" : "";
  return `${signo}${v.toFixed(dec)} ${unit}/h`;
}

function statPeriodLabel(){
  if(mode === "actual"){
    return `últimas ${HOURS_WINDOW} hs`;
  }
  if(rangeStart && rangeEnd){
    return `del ${rangeStart} al ${rangeEnd}`;
  }
  return "rango sin definir";
}

function makeStatChart(ctx, color){
  return new Chart(ctx, {
    type: "line",
    data: {
      labels: [],
      datasets: [
        { data: [], borderColor: color, backgroundColor: color + "33", fill: true, tension: 0.25, pointRadius: 0, borderWidth: 2 },
        { data: [], borderColor: "#fde047", borderWidth: 1.5, pointRadius: 0, fill: false, borderDash:[4,3] }
      ]
    },
    options: {
      responsive: true, animation: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: "#8b95a7", maxTicksLimit: 6, font:{size:9} }, grid:{color:"#232b3d"} },
        y: { ticks: { color: "#8b95a7", font:{size:9} }, grid:{color:"#232b3d"} }
      }
    }
  });
}

function renderStats(meta, windowedRows){
  statsGridEl.innerHTML = "";
  statCharts = {};

  const active = meta.filter(f => checkedKeys.has(f.key) && !f.text && !f.nubosidad && !f.winddir);

  if(!active.length){
    statsGridEl.innerHTML = `<span id="statsEmpty">No hay variables numéricas seleccionadas para mostrar estadísticas.</span>`;
    return;
  }
  if(!windowedRows.length){
    statsGridEl.innerHTML = `<span id="statsEmpty">No hay datos en el período seleccionado.</span>`;
    return;
  }

  const periodLabel = statPeriodLabel();

  active.forEach(f => {
    const values = windowedRows.map(r => r[f.key]);
    const stats = computeStats(values);

    const card = document.createElement("div");
    card.className = "stat-card";
    const canvasId = "statchart_" + cssId(f.key);

    if(!stats){
      card.innerHTML = `
        <div class="stat-left">
          <div class="stat-title">${f.icon} ${f.label} - ${periodLabel}</div>
          <div class="stat-row">Sin datos numéricos en el período.</div>
        </div>`;
      statsGridEl.appendChild(card);
      return;
    }

    // Tendencia = pendiente de la recta de regresión, en unidades/hora,
    // calculada sobre el tiempo real de cada punto (no sobre el índice).
    const tendenciaVal = computeTrendPerHour(windowedRows, f.key);
    const tendenciaTxt = formatTendencia(tendenciaVal, f.unit);
    let trendClass = "trend-flat";
    if(typeof tendenciaVal === "number" && !Number.isNaN(tendenciaVal)){
      if(tendenciaVal > 0) trendClass = "trend-up";
      else if(tendenciaVal < 0) trendClass = "trend-down";
    }
    const trendArrow = trendClass === "trend-up" ? "↑" : (trendClass === "trend-down" ? "↓" : "→");

    card.innerHTML = `
      <div class="stat-left">
        <div class="stat-title">${f.icon} ${f.label} - ${periodLabel}</div>
        <div class="stat-row"><span class="stat-name">Promedio</span> = ${stats.avg.toFixed(f.dec)}${f.unit}</div>
        <div class="stat-row"><span class="stat-name">Máxima</span> = ${stats.max.toFixed(f.dec)}${f.unit}</div>
        <div class="stat-row"><span class="stat-name">Mínima</span> = ${stats.min.toFixed(f.dec)}${f.unit}</div>
        <div class="stat-row"><span class="stat-name">Variación</span> = ${stats.variacion.toFixed(f.dec)}${f.unit}</div>
        <div class="stat-row ${trendClass}"><span class="stat-name">Tendencia</span> = <span class="trend-val">${trendArrow} ${tendenciaTxt}</span></div>
      </div>
      <div class="stat-right">
        <canvas id="${canvasId}"></canvas>
      </div>`;
    statsGridEl.appendChild(card);

    const chart = makeStatChart(document.getElementById(canvasId), f.color);
    chart.data.labels = windowedRows.map(r => formatAxisLabel(r["Fecha/Hora"]));
    chart.data.datasets[0].data = values;
    chart.data.datasets[1].data = linearRegression(values);
    chart.update();
    statCharts[f.key] = chart;
  });
}

/* ---------------- control de pestañas Monitoreo / Estadísticas ---------------- */
function renderCurrentView(){
  if(currentView === "monitor"){
    renderCardsAndCharts(currentFieldMeta, lastWindowedRows, lastLatestRow);
  } else {
    renderStats(currentFieldMeta, lastWindowedRows);
  }
}

function setView(view){
  currentView = view;
  document.getElementById("btnViewMonitor").classList.toggle("active", view === "monitor");
  document.getElementById("btnViewStats").classList.toggle("active", view === "stats");
  monitorViewEl.style.display = view === "monitor" ? "" : "none";
  statsViewEl.style.display = view === "stats" ? "" : "none";
  renderCurrentView();
}

document.getElementById("btnViewMonitor").addEventListener("click", () => setView("monitor"));
document.getElementById("btnViewStats").addEventListener("click", () => setView("stats"));

/* ---------------- filtrado por ventana de tiempo ---------------- */
function windowActual(rows){
  const cutoff = Date.now() - HOURS_WINDOW * 3600 * 1000;
  const filtered = rows.filter(r => r["Fecha/Hora"] && r["Fecha/Hora"].getTime() >= cutoff);
  return filtered.length ? filtered : rows.slice(-500);
}
function windowHistorico(rows, start, end){
  if(!start || !end) return rows;
  const s = new Date(start + "T00:00:00").getTime();
  const e = new Date(end + "T23:59:59").getTime();
  return rows.filter(r => r["Fecha/Hora"] && r["Fecha/Hora"].getTime() >= s && r["Fecha/Hora"].getTime() <= e);
}

/* ---------------- ciclo principal de actualización ---------------- */
async function refresh(rebuildMeta){
  if(!currentBarrio) return;
  try{
    const { cols, rows } = await fetchSheet(currentBarrio.sheetId, currentBarrio.sheetName);
    if(!rows.length) throw new Error("Sin datos");

    if(rebuildMeta){
      currentFieldMeta = buildFieldMeta(cols, rows[rows.length - 1]);
      renderVarsList(currentFieldMeta);
    }

    const latest = rows[rows.length - 1];
    let windowed;
    if(mode === "actual"){
      windowed = windowActual(rows);
    } else {
      windowed = windowHistorico(rows, rangeStart, rangeEnd);
    }
    lastWindowedRows = windowed;
    lastLatestRow = latest;
    renderCurrentView();

    const ts = latest["Fecha/Hora"] ? latest["Fecha/Hora"].toLocaleTimeString("es-AR",{hour12:false}) : "?";
    statusEl.className = "";
    statusEl.textContent = `✔ ${rows.length} registros totales · ${windowed.length} en la ventana mostrada · última lectura: ${ts} · actualizado ${new Date().toLocaleTimeString("es-AR",{hour12:false})}`;
  } catch(err){
    statusEl.className = "err";
    statusEl.textContent = "⚠ Error al leer el Sheet: " + err.message + " (verificá que esté compartido como 'cualquiera con el enlace puede ver')";
    console.error(err);
  }
}

/* ---------------- mini-calendarios (inicio / fin) ---------------- */
const DOW_LABELS = ["Lu","Ma","Mi","Ju","Vi","Sá","Do"];
function toISO(d){
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}
function sameDay(a,b){ return a && b && a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }

function createCalendar(containerEl, onPick){
  const state = { view: new Date(), selected: null };
  const today = new Date();

  function render(){
    const y = state.view.getFullYear(), m = state.view.getMonth();
    const monthNames = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
    const firstOfMonth = new Date(y, m, 1);
    // Lunes = 0 ... Domingo = 6
    const startOffset = (firstOfMonth.getDay() + 6) % 7;
    const daysInMonth = new Date(y, m + 1, 0).getDate();
    const daysInPrevMonth = new Date(y, m, 0).getDate();

    let cellsHtml = "";
    for(let i = 0; i < startOffset; i++){
      const d = daysInPrevMonth - startOffset + 1 + i;
      cellsHtml += `<div class="cal-day muted">${d}</div>`;
    }
    for(let d = 1; d <= daysInMonth; d++){
      const cellDate = new Date(y, m, d);
      const classes = ["cal-day"];
      if(sameDay(cellDate, state.selected)) classes.push("selected");
      if(sameDay(cellDate, today)) classes.push("today");
      cellsHtml += `<div class="${classes.join(" ")}" data-d="${d}">${d}</div>`;
    }
    const totalCells = startOffset + daysInMonth;
    const trailing = (7 - (totalCells % 7)) % 7;
    for(let d = 1; d <= trailing; d++){
      cellsHtml += `<div class="cal-day muted">${d}</div>`;
    }

    containerEl.innerHTML = `
      <div class="cal-head">
        <button class="cal-nav" data-nav="-1">‹</button>
        <span class="cal-title">${monthNames[m]} ${y}</span>
        <button class="cal-nav" data-nav="1">›</button>
      </div>
      <div class="cal-grid">
        ${DOW_LABELS.map(l => `<div class="cal-dow">${l}</div>`).join("")}
        ${cellsHtml}
      </div>`;

    containerEl.querySelectorAll(".cal-nav").forEach(btn => {
      btn.addEventListener("click", () => {
        state.view = new Date(y, m + parseInt(btn.dataset.nav, 10), 1);
        render();
      });
    });
    containerEl.querySelectorAll(".cal-day[data-d]:not(.muted)").forEach(cell => {
      cell.addEventListener("click", () => {
        state.selected = new Date(y, m, parseInt(cell.dataset.d, 10));
        render();
        onPick(state.selected);
      });
    });
  }

  render();
  return state;
}

const calStartEl = document.getElementById("calStart");
const calEndEl = document.getElementById("calEnd");
let calStartState, calEndState;
calStartState = createCalendar(calStartEl, (d) => { rangeStart = toISO(d); });
calEndState   = createCalendar(calEndEl,   (d) => { rangeEnd = toISO(d); });

/* ---------------- controles de modo (Actual / Histórico) ---------------- */
const btnActual = document.getElementById("btnActual");
const btnHistorico = document.getElementById("btnHistorico");
const dateBlock = document.getElementById("dateBlock");
const modeTitle = document.getElementById("modeTitle");
const subtitleText = document.getElementById("subtitleText");

let mode = "actual";

function setMode(newMode){
  mode = newMode;
  btnActual.classList.toggle("active", mode === "actual");
  btnHistorico.classList.toggle("active", mode === "historico");
  dateBlock.style.display = mode === "historico" ? "block" : "none";

  if(mode === "actual"){
    modeTitle.textContent = "Tiempo Real";
    subtitleText.textContent = `Últimas ${HOURS_WINDOW} horas · actualización automática cada 60s`;
    if(!autoRefreshTimer) autoRefreshTimer = setInterval(() => refresh(false), REFRESH_MS);
    refresh(false);
  } else {
    modeTitle.textContent = "Histórico";
    subtitleText.textContent = rangeStart && rangeEnd ? `Del ${rangeStart} al ${rangeEnd}` : "Elegí un rango de fechas y presioná «Aplicar rango»";
    if(autoRefreshTimer){ clearInterval(autoRefreshTimer); autoRefreshTimer = null; }
    if(rangeStart && rangeEnd) refresh(false);
  }
}

btnActual.addEventListener("click", () => setMode("actual"));
btnHistorico.addEventListener("click", () => setMode("historico"));

document.getElementById("applyRange").addEventListener("click", () => {
  if(!rangeStart || !rangeEnd){ alert("Elegí un día de inicio y un día de fin en los calendarios."); return; }
  if(rangeStart > rangeEnd){ alert("La fecha de inicio es posterior a la de fin."); return; }
  subtitleText.textContent = `Del ${rangeStart} al ${rangeEnd}`;
  refresh(false);
});

barrioSelectEl.addEventListener("change", (e) => selectBarrio(e.target.value));

/* ---------------- arranque ---------------- */
loadBarrios().then(() => setMode("actual"));
